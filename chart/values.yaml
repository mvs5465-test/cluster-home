replicaCount: 1

image:
  repository: ghcr.io/mvs5465/cluster-home
  tag: "main"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  hosts: []
  tls: []

resources:
  requests:
    memory: "64Mi"
    cpu: "25m"
  limits:
    memory: "128Mi"
    cpu: "100m"

config:
  fileName: services.json
  mountPath: /config
  inlineJson: ""

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

clusterInfo:
  enabled: true

otel:
  endpoint: ""
  insecure: true
  serviceName: "cluster-home"

nodeSelector: {}
tolerations: []
affinity: {}
