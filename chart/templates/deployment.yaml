apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cluster-home.fullname" . }}
  labels:
    {{- include "cluster-home.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cluster-home.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if .Values.metrics.enabled }}
      annotations:
        k8s.grafana.com/scrape: "true"
        k8s.grafana.com/job: {{ .Values.metrics.job | quote }}
        k8s.grafana.com/metrics.path: {{ .Values.metrics.path | quote }}
        k8s.grafana.com/metrics.portName: "http"
      {{- end }}
      labels:
        {{- include "cluster-home.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else }}{{ include "cluster-home.fullname" . }}{{ end }}
      containers:
        - name: home
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: HOME_CONFIG_PATH
              value: {{ printf "%s/%s" .Values.config.mountPath .Values.config.fileName | quote }}
            - name: CLUSTER_INFO_ENABLED
              value: {{ .Values.clusterInfo.enabled | quote }}
            {{- if .Values.otel.endpoint }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: {{ .Values.otel.insecure | quote }}
            {{- end }}
          {{- if .Values.config.inlineJson }}
          volumeMounts:
            - name: home-config
              mountPath: {{ printf "%s/%s" .Values.config.mountPath .Values.config.fileName | quote }}
              subPath: {{ .Values.config.fileName }}
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.config.inlineJson }}
      volumes:
        - name: home-config
          configMap:
            name: {{ include "cluster-home.fullname" . }}-config
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
