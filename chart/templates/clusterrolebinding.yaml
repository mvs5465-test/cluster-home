{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cluster-home.fullname" . }}
  labels:
    {{- include "cluster-home.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cluster-home.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else }}{{ include "cluster-home.fullname" . }}{{ end }}
    namespace: {{ .Release.Namespace }}
{{- end }}
